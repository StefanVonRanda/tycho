id = "tycho"
name = "Tycho"
version = "0.0.1"
schema_version = 1
authors = ["Tycho"]
description = "Tycho language support for Zed: tree-sitter highlighting + diagnostics via tycho-lsp."
repository = "https://github.com/StefanVonRanda/tycho"

# The tree-sitter grammar. Zed fetches + builds it from a git repo, so the grammar
# in ../grammars/tycho (grammar.js + generated src/) must be published as its own
# repo (e.g. tree-sitter-tycho); set `rev` to that repo's commit. See README.md.
[grammars.tycho]
repository = "https://github.com/StefanVonRanda/tree-sitter-tycho"
rev = "0000000000000000000000000000000000000000"

# Register tycho-lsp as the language server for Tycho files.
[language_servers.tycho-lsp]
name = "tycho-lsp"
languages = ["Tycho"]
