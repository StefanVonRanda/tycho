<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
     fill="none" stroke="#1c1c2e" stroke-width="2.6"
     role="img" aria-label="Tycho">
  <!-- Concentric arenas: each ring is a scope boundary -->
  <circle cx="100" cy="100" r="26"/>
  <circle cx="100" cy="100" r="50"/>
  <circle cx="100" cy="100" r="74"/>
  <!-- A satellite on the middle ring, carrying its own ring: a nested scope's arena -->
  <circle cx="143.3" cy="75" r="16"/>
  <!-- Bodies (values) -->
  <g fill="#1c1c2e" stroke="none">
    <circle cx="100"   cy="100" r="7"/>     <!-- root arena (main) -->
    <circle cx="143.3" cy="75"  r="5.5"/>   <!-- the satellite (nested scope) -->
    <circle cx="143.3" cy="91"  r="3.4"/>   <!-- a value on the satellite's ring -->
    <circle cx="35.9"  cy="137" r="4"/>     <!-- a value on the outer arena -->
  </g>
</svg>
