<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tycho">
  <!-- Simplified concentric mark for small sizes; adapts to the browser theme. -->
  <style>
    .ink { fill: none; stroke: #1c1c2e; stroke-width: 4; }
    .dot { fill: #1c1c2e; stroke: none; }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #ececf4; }
      .dot { fill: #ececf4; }
    }
  </style>
  <circle class="ink" cx="50" cy="50" r="20"/>
  <circle class="ink" cx="50" cy="50" r="38"/>
  <circle class="ink" cx="70" cy="38" r="11"/>
  <circle class="dot" cx="50" cy="50" r="4.5"/>
  <circle class="dot" cx="70" cy="38" r="4"/>
</svg>
