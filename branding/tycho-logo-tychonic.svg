<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
     fill="none" stroke="#1b1b2b" stroke-width="2.4">
  <!-- Earth-centred orbits = the nested arena hierarchy (each ring is a scope boundary) -->
  <circle cx="100" cy="100" r="30"/>
  <circle cx="100" cy="100" r="56"/>
  <circle cx="100" cy="100" r="84"/>

  <!-- the Sun rides the middle orbit and carries its OWN little system =
       a nested scope with its own arenas, crossing the outer ones -->
  <circle cx="147.5" cy="70.3" r="15"/>
  <circle cx="147.5" cy="70.3" r="27"/>

  <!-- bodies (values) -->
  <g fill="#1b1b2b" stroke="none">
    <circle cx="100"   cy="100"  r="6.5"/>  <!-- Earth: the root arena (main) -->
    <circle cx="147.5" cy="70.3" r="6"/>    <!-- Sun: the nested scope -->
    <circle cx="22.1"  cy="131.5" r="3.6"/> <!-- a body on the outer orbit -->
    <circle cx="123"   cy="58.9"  r="3.6"/> <!-- a body on the Sun's outer orbit -->
    <circle cx="151.4" cy="84.8"  r="3.6"/> <!-- a body on the Sun's inner orbit -->
  </g>
</svg>
