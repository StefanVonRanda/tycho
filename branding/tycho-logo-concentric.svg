<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"
     fill="none" stroke="#1b1b2b" stroke-width="2.6">
  <!-- A cleaner, more abstract take: pure concentric arenas + one satellite
       that carries its own single ring (a value that escaped and re-homed its arena) -->
  <circle cx="100" cy="100" r="26"/>
  <circle cx="100" cy="100" r="50"/>
  <circle cx="100" cy="100" r="74"/>

  <!-- satellite system on the middle ring -->
  <circle cx="143.3" cy="75"  r="16"/>

  <g fill="#1b1b2b" stroke="none">
    <circle cx="100"   cy="100" r="7"/>     <!-- root -->
    <circle cx="143.3" cy="75"  r="5.5"/>   <!-- satellite -->
    <circle cx="100"   cy="26"  r="4"/>     <!-- body on the outer ring (top) -->
    <circle cx="143.3" cy="91"  r="3.4"/>   <!-- body on the satellite's ring -->
  </g>
</svg>
